<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Rift Timer</title>
  <style>
    :root {
      --panel: rgba(255,255,255,.82);
      --panel-2: rgba(246,249,253,.96);
      --text: #1a2236;
      --muted: #6d7890;
      --line: rgba(122, 134, 170, .14);
      --safe-accent: #22c55e;
      --warn-accent: #f59e0b;
      --danger-accent: #ef4444;
      --shadow: 0 24px 60px rgba(82, 97, 135, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(106,102,255,.10), transparent 28%),
        radial-gradient(circle at bottom left, rgba(127,111,255,.06), transparent 24%),
        linear-gradient(180deg, #eef3f8 0%, #e7edf5 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Noto Sans TC", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(680px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .header {
      padding: 20px 22px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .badge {
      font-size: 12px;
      font-weight: 700;
      color: #5f58ed;
      border: 1px solid rgba(106,102,255,.14);
      background: rgba(106,102,255,.08);
      padding: 8px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .main {
      padding: 14px 22px 22px;
      display: grid;
      gap: 12px;
    }

    .viewer-banner,
    .sync-banner {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.62);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .viewer-mode .viewer-banner,
    .sync-banner.show {
      display: flex;
    }

    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,.84), rgba(246,249,253,.96));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 22px;
      overflow: hidden;
      transition: box-shadow .2s ease, border-color .2s ease;
      order: 1;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .status {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .phase-count {
      font-size: 12px;
      color: var(--muted);
    }

    .countdown {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      line-height: 1;
      margin: 8px 0 10px;
      flex-wrap: wrap;
    }

    .number {
      font-size: clamp(88px, 18vw, 148px);
      font-weight: 900;
      letter-spacing: -.08em;
      color: #2a3350;
    }

    .label {
      font-size: 16px;
      color: var(--muted);
      font-weight: 700;
      padding-bottom: 10px;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    .bar-wrap { margin-top: 18px; }

    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(106,102,255,.08);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      transition: width .12s linear, background-color .2s ease;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      order: 2;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      order: 3;
    }

    .card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.65);
    }

    .card .k {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: .04em;
    }

    .card .v {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .clickable {
      cursor: pointer;
      user-select: none;
    }

    .room-row,
    .share-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      order: 4;
    }

    .share-row {
      grid-template-columns: 1.2fr .8fr;
      order: 5;
    }

    button, input { font-family: inherit; }

    input {
      width: 100%;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      outline: none;
    }

    button {
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 18px;
      padding: 14px 12px;
      background: rgba(255,255,255,.8);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      transition: transform .08s ease, opacity .15s ease, box-shadow .2s ease;
      box-shadow: 0 10px 24px rgba(82, 97, 135, .08);
    }

    button:hover { opacity: .96; }
    button:active { transform: translateY(1px) scale(.995); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .action-btn {
      min-height: 88px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -.02em;
      border-radius: 24px;
    }

    .action-btn small,
    .share-btn small,
    .room-btn small,
    .danger-btn small {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      font-weight: 700;
      opacity: .8;
    }

    .spawn-action {
      background: linear-gradient(180deg, #736cff, #5f58ed);
      color: #fff;
      box-shadow: 0 16px 34px rgba(95, 88, 237, .24);
    }

    .despawn-action {
      background: linear-gradient(180deg, #ffffff, #f5f8fd);
      color: var(--text);
    }

    .danger-btn,
    .share-btn,
    .room-btn {
      background: linear-gradient(180deg, #ffffff, #f5f8fd);
      color: var(--muted);
    }

    .room-btn,
    .share-btn { min-width: 120px; }
    .share-url { color: var(--muted); }
    .footer { display: none; }

    .safe .status { color: var(--safe-accent); }
    .warn .status { color: var(--warn-accent); }
    .danger .status { color: var(--danger-accent); }

    .safe .bar-fill { background: linear-gradient(90deg, #b6f0c8, #22c55e); }
    .warn .bar-fill { background: linear-gradient(90deg, #ffe0b3, #f59e0b); }
    .danger .bar-fill { background: linear-gradient(90deg, #ffc0c0, #ef4444); }

    .warn { box-shadow: 0 24px 42px rgba(245,158,11,.16); }
    .danger { box-shadow: 0 24px 42px rgba(239,68,68,.18); }
    .critical { box-shadow: 0 24px 42px rgba(255,77,109,.16); }

    .pulse { animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 18px 36px rgba(82, 97, 135, .10); }
      50% { box-shadow: 0 24px 42px rgba(239,68,68,.22); }
    }

    .viewer-mode .controls,
    .viewer-mode .cards .clickable,
    .viewer-mode .room-row,
    .viewer-mode .share-btn {
      pointer-events: none;
      opacity: .55;
      cursor: not-allowed;
      filter: grayscale(.15);
    }

    @media (max-width: 700px) {
      body {
        display: block;
        padding: 8px;
      }

      .app {
        width: 100%;
        border-radius: 26px;
      }

      .header {
        padding: 16px 16px 8px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .title { font-size: 18px; }

      .sub {
        font-size: 11px;
        line-height: 1.4;
      }

      .badge {
        font-size: 11px;
        padding: 7px 11px;
      }

      .main {
        padding: 10px 16px 16px;
        gap: 10px;
      }

      .viewer-banner,
      .sync-banner {
        order: 0;
        padding: 10px 12px;
        font-size: 12px;
        border-radius: 16px;
      }

      .hero {
        order: 1;
        padding: 16px;
        border-radius: 22px;
        position: sticky;
        top: 8px;
        z-index: 5;
      }

      .status-row {
        flex-direction: row;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 6px;
      }

      .status { font-size: 12px; }

      .phase-count {
        font-size: 11px;
        text-align: right;
      }

      .countdown {
        display: grid;
        grid-template-columns: 1fr;
        gap: 4px;
        margin: 6px 0 8px;
      }

      .number {
        font-size: clamp(92px, 29vw, 136px);
        line-height: .9;
      }

      .label {
        font-size: 17px;
        padding-bottom: 0;
      }

      .hint {
        font-size: 12px;
        min-height: auto;
      }

      .bar-wrap { margin-top: 12px; }
      .bar { height: 10px; }

      .controls {
        order: 2;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .spawn-action,
      .despawn-action {
        grid-column: span 2;
      }

      .action-btn {
        min-height: 72px;
        font-size: 24px;
        border-radius: 20px;
      }

      .action-btn small,
      .share-btn small,
      .room-btn small,
      .danger-btn small {
        margin-top: 6px;
        font-size: 11px;
      }

      .cards {
        order: 3;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .card {
        padding: 13px;
        border-radius: 18px;
      }

      .card .k {
        font-size: 10px;
        margin-bottom: 6px;
      }

      .card .v { font-size: 21px; }

      .room-row,
      .share-row {
        order: 4;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      input,
      button {
        min-height: 52px;
        padding: 12px 14px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="title">Time Rift</div>
        <div class="sub">黑水計時器 · 65–85 秒浮動預警版</div>
      </div>
      <div class="badge" id="syncStateBadge">Sync idle</div>
    </div>

    <div class="main">
      <div class="viewer-banner" id="viewerBanner">觀看模式</div>
      <div class="sync-banner" id="syncBanner">請先填入 Firebase 設定</div>

      <section class="hero safe" id="hero">
        <div class="status-row">
          <div class="status" id="statusText">待命</div>
          <div class="phase-count" id="metaText">Space / Ctrl / R / M</div>
        </div>

        <div class="countdown">
          <div class="number" id="bigNumber">--</div>
          <div class="label" id="bigLabel">按下 Spawn 或 Despawn</div>
        </div>

        <div class="hint" id="hintText">Space = 黑水出現 ・ Ctrl = 黑水消失 ・ 65–85 秒區間為「隨時可能出現」</div>

        <div class="bar-wrap">
          <div class="bar">
            <div class="bar-fill" id="barFill"></div>
          </div>
        </div>
      </section>

      <section class="controls">
        <button class="action-btn spawn-action" id="spawnBtn">Spawn<small>黑水出現 · Space</small></button>
        <button class="action-btn despawn-action" id="despawnBtn">Despawn<small>黑水消失 · Ctrl</small></button>
        <button class="danger-btn" id="resetBtn">Reset<small>重新校正計時</small></button>
      </section>

      <section class="cards">
        <div class="card">
          <div class="k">狀態</div>
          <div class="v" id="stateMini">待命</div>
        </div>
        <div class="card">
          <div class="k">黑水區間</div>
          <div class="v" id="nextSpawnMini">65–85</div>
        </div>
        <div class="card">
          <div class="k">提示音</div>
          <div class="v clickable" id="soundMini">ON</div>
        </div>
        <div class="card">
          <div class="k">房間</div>
          <div class="v" id="roomMini">未連線</div>
        </div>
      </section>

      <section class="room-row">
        <input id="roomInput" type="text" placeholder="房號，例如 lotus-team-a" />
        <button class="room-btn" id="joinRoomBtn">連線房間<small>建立 / 加入</small></button>
        <button class="room-btn" id="leaveRoomBtn">離開房間<small>停止同步</small></button>
      </section>

      <section class="share-row">
        <input class="share-url" id="shareUrlInput" type="text" readonly value="" />
        <button class="share-btn" id="shareBtn">分享觀看網址<small>viewer only</small></button>
      </section>
    </div>

    <div class="footer"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
    import {
      getFirestore,
      doc,
      setDoc,
      onSnapshot,
      serverTimestamp,
      deleteDoc
    } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyCKRFShtyQ9dMtO54_XUOb0pWHplKJX_80',
      authDomain: 'more-mss.firebaseapp.com',
      projectId: 'more-mss',
      storageBucket: 'more-mss.firebasestorage.app',
      messagingSenderId: '424178571978',
      appId: '1:424178571978:web:68d477d99908281acfb233'
    };

    const hasFirebaseConfig = !Object.values(firebaseConfig).some(v => String(v).includes('REPLACE_ME'));

    let app = null;
    let db = null;

    if (hasFirebaseConfig) {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    }

    const MIN_SPAWN = 65;
    const MAX_SPAWN = 85;
    const PREWARN = 45;
    const BLACK_WATER_DURATION = 30;

    const hero = document.getElementById('hero');
    const statusText = document.getElementById('statusText');
    const bigNumber = document.getElementById('bigNumber');
    const bigLabel = document.getElementById('bigLabel');
    const hintText = document.getElementById('hintText');
    const barFill = document.getElementById('barFill');
    const metaText = document.getElementById('metaText');

    const stateMini = document.getElementById('stateMini');
    const nextSpawnMini = document.getElementById('nextSpawnMini');
    const soundMini = document.getElementById('soundMini');
    const roomMini = document.getElementById('roomMini');

    const spawnBtn = document.getElementById('spawnBtn');
    const despawnBtn = document.getElementById('despawnBtn');
    const resetBtn = document.getElementById('resetBtn');
    const shareUrlInput = document.getElementById('shareUrlInput');
    const shareBtn = document.getElementById('shareBtn');
    const viewerBanner = document.getElementById('viewerBanner');
    const syncBanner = document.getElementById('syncBanner');
    const syncStateBadge = document.getElementById('syncStateBadge');
    const roomInput = document.getElementById('roomInput');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const leaveRoomBtn = document.getElementById('leaveRoomBtn');

    const params = new URLSearchParams(window.location.search);
    const viewerMode = params.get('viewer') === '1';
    const roomFromUrl = params.get('room') || '';

    let running = false;
    let muted = false;
    let hasCalibration = false;
    let nextSpawnTarget = 0;
    let timer = null;
    let lastWhole = null;
    let lastPhase = 'idle';
    let audioCtx = null;
    let roomId = '';
    let unsubscribeRoom = null;
    let lastRemoteEventId = '';

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function beep(type = 'short') {
      if (muted || viewerMode) return;
      try {
        const ctx = getAudioCtx();
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        let duration = 0.08;
        let freq = 880;
        if (type === 'warn') { duration = 0.12; freq = 1046; }
        if (type === 'spawn') { duration = 0.28; freq = 660; }

        osc.frequency.value = freq;
        osc.type = 'square';
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.start(now);
        osc.stop(now + duration + 0.02);
      } catch (e) {
        console.warn('Audio unavailable', e);
      }
    }

    function fmt(v) {
      return Math.max(0, v).toFixed(1) + 's';
    }

    function setClass(state) {
      hero.classList.remove('safe', 'warn', 'danger', 'critical', 'pulse');
      hero.classList.add(state);
      if (state === 'warn' || state === 'danger') hero.classList.add('pulse');
    }

    function setNumberColor(state) {
      if (state === 'safe') bigNumber.style.color = '#22c55e';
      else if (state === 'warn') bigNumber.style.color = '#f59e0b';
      else if (state === 'danger') bigNumber.style.color = '#ef4444';
      else bigNumber.style.color = '#2a3350';
    }

    function updateSoundUI() {
      soundMini.textContent = muted ? 'OFF' : 'ON';
    }

    function updateShareUrl() {
      const url = new URL(window.location.href);
      url.searchParams.set('viewer', '1');
      if (roomId) url.searchParams.set('room', roomId);
      shareUrlInput.value = url.toString();
    }

    function setSyncState(text, showBanner = false) {
      syncStateBadge.textContent = text;
      syncBanner.textContent = text;
      syncBanner.classList.toggle('show', showBanner);
    }

    function sanitizeRoomId(raw) {
      return raw.trim().toLowerCase().replace(/[^a-z0-9-_]/g, '-').replace(/-+/g, '-').slice(0, 40);
    }

    function setRoomUI() {
      roomMini.textContent = roomId || '未連線';
      roomInput.value = roomId;
      updateShareUrl();
      metaText.textContent = roomId ? `房間：${roomId}` : 'Space / Ctrl / R / M';
    }

    function clearTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
      running = false;
    }

    function resetDisplay() {
      clearTimer();
      hasCalibration = false;
      statusText.textContent = viewerMode ? '觀看模式' : '待命';
      bigNumber.textContent = '--';
      bigLabel.textContent = viewerMode ? '等待房主操作' : '按下 Spawn 或 Despawn';
      hintText.textContent = viewerMode ? '同步等待中' : 'Space = 黑水出現 ・ Ctrl = 黑水消失 ・ 65–85 秒區間為隨時可能出現';
      hero.style.borderColor = 'rgba(122, 134, 170, .14)';
      stateMini.textContent = viewerMode ? '等待' : '待命';
      nextSpawnMini.textContent = '65–85';
      setClass('safe');
      setNumberColor('idle');
      barFill.style.width = '0%';
      lastWhole = null;
      lastPhase = 'idle';
    }

    function resetTimer(localOnly = false) {
      resetDisplay();
      if (!localOnly) publishEvent('reset');
    }

    function toggleMute() {
      if (viewerMode) return;
      muted = !muted;
      updateSoundUI();
    }

    function startTimerWithDuration(durationSec, phaseSeed) {
      nextSpawnTarget = performance.now() + (durationSec * 1000);
      running = true;
      hasCalibration = true;
      lastWhole = null;
      lastPhase = phaseSeed;
      render();
      if (!timer) timer = setInterval(render, 100);
    }

    function calibrateFromSpawn(localOnly = false) {
      if (viewerMode && !localOnly) return;
      startTimerWithDuration(MAX_SPAWN, 'safe');
      beep('spawn');
      if (!localOnly) publishEvent('spawn', MAX_SPAWN);
    }

    function calibrateFromDespawn(localOnly = false) {
      if (viewerMode && !localOnly) return;
      startTimerWithDuration(MAX_SPAWN - BLACK_WATER_DURATION, 'safe');
      beep('short');
      if (!localOnly) publishEvent('despawn', MAX_SPAWN - BLACK_WATER_DURATION);
    }

    function render() {
      if (!running || !hasCalibration) return;

      const now = performance.now();
      const remaining = Math.max(0, (nextSpawnTarget - now) / 1000);
      const elapsedFromAnchor = Math.max(0, MAX_SPAWN - remaining);
      const minWindowRemaining = Math.max(0, MIN_SPAWN - elapsedFromAnchor);
      const maxWindowRemaining = Math.max(0, MAX_SPAWN - elapsedFromAnchor);
      const progress = Math.min(100, (elapsedFromAnchor / MAX_SPAWN) * 100);
      const whole = Math.ceil(maxWindowRemaining);

      barFill.style.width = `${progress}%`;
      hero.classList.remove('critical');

      if (elapsedFromAnchor < PREWARN) {
        setClass('safe');
        setNumberColor('safe');
        statusText.textContent = '安全期';
        bigNumber.textContent = Math.ceil(PREWARN - elapsedFromAnchor);
        bigLabel.textContent = '距離預警還有';
        hintText.textContent = '先正常輸出，尚未進入黑水高風險時段';
        hero.style.borderColor = 'rgba(122, 134, 170, .14)';
        stateMini.textContent = '安全';
        nextSpawnMini.textContent = `${Math.ceil(minWindowRemaining)}–${Math.ceil(maxWindowRemaining)}`;
        lastPhase = 'safe';
      } else if (elapsedFromAnchor < MIN_SPAWN) {
        setClass('warn');
        setNumberColor('warn');
        statusText.textContent = '預警期';
        bigNumber.textContent = Math.ceil(MIN_SPAWN - elapsedFromAnchor);
        bigLabel.textContent = '距離最早黑水';
        hintText.textContent = '開始提醒隊友，黑水快進入浮動區間';
        hero.style.borderColor = 'rgba(245,158,11,.30)';
        stateMini.textContent = '預警';
        nextSpawnMini.textContent = `${Math.ceil(minWindowRemaining)}–${Math.ceil(maxWindowRemaining)}`;
        if (lastPhase !== 'warn') {
          beep('warn');
          lastPhase = 'warn';
        }
      } else if (elapsedFromAnchor <= MAX_SPAWN) {
        setClass('danger');
        setNumberColor('danger');
        statusText.textContent = '⚠ 黑水可能隨時出現';
        bigNumber.textContent = Math.ceil(maxWindowRemaining);
        bigLabel.textContent = '黑水高風險區間';
        hintText.textContent = '65–85 秒內隨時可能生成黑水！請高度注意並準備報水';
        hero.style.borderColor = 'rgba(255,60,60,.45)';
        stateMini.textContent = '黑水區';
        nextSpawnMini.textContent = `0–${Math.ceil(maxWindowRemaining)}`;
        if (whole <= 3) hero.classList.add('critical');
        if (lastPhase !== 'danger') {
          beep('spawn');
          lastPhase = 'danger';
        }
        if (whole !== lastWhole && whole <= 5) {
          beep('warn');
        }
      }

      lastWhole = whole;

      if (remaining <= 0) {
        clearTimer();
        hero.classList.add('critical');
        setClass('danger');
        setNumberColor('danger');
        statusText.textContent = '超過 85 秒';
        bigNumber.textContent = '0';
        bigLabel.textContent = '請手動校正';
        hintText.textContent = '若黑水已出現請按 Spawn，若已消失請按 Despawn';
        hero.style.borderColor = 'rgba(255,77,109,.26)';
        stateMini.textContent = '超時';
        nextSpawnMini.textContent = '超時';
        lastPhase = 'idle';
      }
    }

    async function publishEvent(type, duration = null) {
      if (!db || !roomId || viewerMode) return;
      const eventId = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      lastRemoteEventId = eventId;
      await setDoc(doc(db, 'timeRiftRooms', roomId), {
        roomId,
        type,
        duration,
        eventId,
        emittedAt: Date.now(),
        updatedAt: serverTimestamp()
      }, { merge: true });
    }

    function applyRemoteEvent(data) {
      if (!data || !data.type) return;
      if (data.eventId && data.eventId === lastRemoteEventId) return;
      lastRemoteEventId = data.eventId || '';

      if (data.type === 'spawn') {
        calibrateFromSpawn(true);
      } else if (data.type === 'despawn') {
        calibrateFromDespawn(true);
      } else if (data.type === 'reset') {
        resetTimer(true);
      }
    }

    async function joinRoom() {
      if (!hasFirebaseConfig) {
        setSyncState('請先填入 Firebase 設定', true);
        return;
      }
      const nextRoom = sanitizeRoomId(roomInput.value || roomFromUrl || 'default-room');
      if (!nextRoom) {
        setSyncState('請輸入有效房號', true);
        return;
      }

      if (unsubscribeRoom) unsubscribeRoom();
      roomId = nextRoom;
      setRoomUI();

      const roomRef = doc(db, 'timeRiftRooms', roomId);
      unsubscribeRoom = onSnapshot(roomRef, (snap) => {
        if (!snap.exists()) return;
        applyRemoteEvent(snap.data());
      });

      setSyncState(viewerMode ? `Viewer synced: ${roomId}` : `Host synced: ${roomId}`, true);
    }

    async function leaveRoom() {
      if (unsubscribeRoom) {
        unsubscribeRoom();
        unsubscribeRoom = null;
      }
      if (!viewerMode && db && roomId) {
        try {
          await deleteDoc(doc(db, 'timeRiftRooms', roomId));
        } catch (e) {
          console.warn(e);
        }
      }
      roomId = '';
      setRoomUI();
      setSyncState('Sync idle', false);
      resetDisplay();
    }

    async function copyShareUrl() {
      const url = shareUrlInput.value;
      try {
        await navigator.clipboard.writeText(url);
        shareBtn.innerHTML = '已複製<small>貼給隊友即可</small>';
        setTimeout(() => {
          shareBtn.innerHTML = '分享觀看網址<small>viewer only</small>';
        }, 1800);
      } catch (err) {
        shareUrlInput.focus();
        shareUrlInput.select();
        shareBtn.innerHTML = '請手動複製<small>已選取網址</small>';
      }
    }

    function runSelfTests() {
      console.assert(MIN_SPAWN < MAX_SPAWN, 'MIN_SPAWN must be less than MAX_SPAWN');
      console.assert(PREWARN < MIN_SPAWN, 'PREWARN must be less than MIN_SPAWN');
      console.assert(BLACK_WATER_DURATION > 0, 'BLACK_WATER_DURATION must be positive');
      console.assert(sanitizeRoomId('Lotus Team A') === 'lotus-team-a', 'sanitizeRoomId should normalize room names');
      console.assert(fmt(12.34) === '12.3s', 'fmt should format seconds to 1 decimal place');
    }

    spawnBtn.addEventListener('click', () => calibrateFromSpawn(false));
    despawnBtn.addEventListener('click', () => calibrateFromDespawn(false));
    resetBtn.addEventListener('click', () => resetTimer(false));
    soundMini.addEventListener('click', toggleMute);
    shareBtn.addEventListener('click', copyShareUrl);
    joinRoomBtn.addEventListener('click', joinRoom);
    leaveRoomBtn.addEventListener('click', leaveRoom);

    window.addEventListener('keydown', (e) => {
      if (viewerMode) return;
      if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (e.code === 'Space') {
        e.preventDefault();
        calibrateFromSpawn(false);
      } else if (e.key === 'Control') {
        calibrateFromDespawn(false);
      } else if (e.key === 'r' || e.key === 'R') {
        resetTimer(false);
      } else if (e.key === 'm' || e.key === 'M') {
        toggleMute();
      }
    });

    runSelfTests();
    updateSoundUI();
    setRoomUI();
    setSyncState(hasFirebaseConfig ? 'Sync ready' : '請先填入 Firebase 設定', !hasFirebaseConfig);

    if (viewerMode) {
      document.body.classList.add('viewer-mode');
      viewerBanner.textContent = '觀看模式';
      statusText.textContent = '觀看模式';
      bigLabel.textContent = '等待房主操作';
      hintText.textContent = '同步等待中';
    }

    if (roomFromUrl) {
      roomInput.value = roomFromUrl;
      joinRoom();
    } else {
      resetDisplay();
    }
  </script>
</body>
</html>
